<!-- Add to Home Screen Widget -->
<div id="a2hs-widget" class="a2hs-widget" role="region" aria-label="Add to Home Screen prompt">
  <div class="a2hs-content">
    <div class="a2hs-text">
      <strong>Add Tatheer to your Home Screen</strong>
      <span class="a2hs-subtext" id="a2hs-subtext">
        Install for faster access and better experience.
      </span>
    </div>

    <div class="a2hs-actions">
      <button id="a2hs-install-btn" class="a2hs-install-btn">
        Add
      </button>
      <button id="a2hs-close-btn" class="a2hs-close-btn" aria-label="Close">
        ×
      </button>
    </div>
  </div>
</div>

<style>
/* Hide by default */
.a2hs-widget {
  display: none;
}

/* Mobile styles */
@media (max-width: 768px) {

.a2hs-widget.a2hs-active {
  display: block;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #111827;
  color: #ffffff;
  z-index: 9999;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  animation: slideDown 0.3s ease-out forwards;
}

  .a2hs-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    gap: 10px;
  }

  .a2hs-text {
    font-size: 16px;
    line-height: 1.4;
    flex: 1;
  }

  .a2hs-subtext {
    display: block;
    font-size: 14px;
    opacity: 0.85;
    margin-top: 4px;
  }

  .a2hs-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .a2hs-install-btn {
    background: #00c2a8;
    color: #000;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    min-height: 44px;
    min-width: 44px;
    white-space: nowrap;
    transition: background 0.2s ease;
  }

  .a2hs-install-btn:hover {
    background: #00a892;
  }

  .a2hs-install-btn:active {
    background: #008976;
  }

  .a2hs-install-btn:focus {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  .a2hs-install-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .a2hs-close-btn {
    background: transparent;
    border: none;
    color: #ffffff;
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
    min-height: 44px;
    min-width: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease;
  }

  .a2hs-close-btn:hover {
    opacity: 0.8;
  }

  .a2hs-close-btn:focus {
    outline: 2px solid #ffffff;
    outline-offset: 2px;
  }

  @keyframes slideDown {
    from { transform: translateY(-100%); }
    to { transform: translateY(0); }
  }

  /* Push page content down when visible */
  body.a2hs-visible {
    padding-top: 70px;
  }
}

/* Tablet and larger screens - hide widget */
@media (min-width: 769px) {
  .a2hs-widget {
    display: none !important;
  }
}
</style>

<script>
(function () {

  const widget = document.getElementById("a2hs-widget");
  const installBtn = document.getElementById("a2hs-install-btn");
  const closeBtn = document.getElementById("a2hs-close-btn");
  const subText = document.getElementById("a2hs-subtext");

  const STORAGE_KEY = "a2hs-dismissed";
  let deferredPrompt = null;

  // Exit if user dismissed
  if (localStorage.getItem(STORAGE_KEY) === "true") return;
  
  // Dismiss function
  function hideWidget(persist = false) {
    widget.classList.remove("a2hs-active");
    
    if (persist) {
      localStorage.setItem(STORAGE_KEY, "true");
    }
  }

  /* ---------- Install Button Click Handler ---------- */
  installBtn.addEventListener("click", async () => {
    if (deferredPrompt) {
      try {
        deferredPrompt.prompt();
        const choiceResult = await deferredPrompt.userChoice;

        if (choiceResult.outcome === "accepted") {
          hideWidget(true);
        }

        deferredPrompt = null;
      } catch (error) {
        console.error("Installation prompt error:", error);
      }
    } else {
      subText.innerHTML = 'Tap <strong>Share</strong> <span style="opacity: 0.7;">(bottom menu)</span> → <strong>Add to Home Screen</strong>';
      installBtn.textContent = "Got it";
      installBtn.disabled = true;
      
      setTimeout(() => {
        hideWidget(true);
      }, 3000);
    }
  });

  /* ---------- Close Button Handler ---------- */
  closeBtn.addEventListener("click", () => {
    hideWidget(true);
  });

})();
</script>
